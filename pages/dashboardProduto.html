<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Produto - EstoqueHub</title>
        <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/dashboardProduto.css">
    <link rel="stylesheet" href="../scripts/main.js">
    <link rel="stylesheet" href="../assets/css/mobile-menu.css">
</head> 

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" width="150" height="40">
                    <!-- Fundo do logo -->
                    <rect x="10" y="15" width="50" height="50" rx="8" fill="#3498db" />

                    <!-- Elementos de estoque (caixas) -->
                    <rect x="20" y="25" width="15" height="15" rx="2" fill="white" opacity="0.9" />
                    <rect x="35" y="40" width="15" height="15" rx="2" fill="white" opacity="0.9" />
                    <rect x="20" y="40" width="15" height="15" rx="2" fill="white" opacity="0.7" />

                    <!-- Nome da empresa -->
                    <text x="70" y="50" font-family="Segoe UI, sans-serif" font-size="28" font-weight="bold" fill="#333333">
                        <tspan fill="#3498db">Estoque</tspan>
                        <tspan fill="#2c3e50">Hub</tspan>
                    </text>

                    <!-- Slogan opcional -->
                    <text x="70" y="65" font-family="Segoe UI, sans-serif" font-size="12" fill="#7f8c8d">Gestão de
                        estoque simplificada</text>
                </svg>
            </a>
        </div>
        <nav class="menu">
            <a href="#">Adicionar Produto</a>
            <a href="#">Sair</a>
        </nav>
    </header>

    <div class="layout">
        <!-- Aside -->
        <aside class="aside">
            <nav>
                <ul>
                    <li><a href="#">Dashboard</a></li>
                    <li><a class="active" href="#">Produtos</a></li>
                    <li><a href="#">Configuração</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <main class="main-content">
            <div class="form-container">
                <div class="form-header">
                    <h2 id="form-title">Adicionar Produto</h2>
                </div>

                <form id="productForm">
                    <div class="form-group">
                        <label for="nome">Nome do produto</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" name="descricao" required>
                    </div>

                    <div class="form-group">
                        <label for="preco">Preço unidade</label>
                        <input type="number" id="preco" name="preco" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade" min="0" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelBtn">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">Salvar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>

</html>
